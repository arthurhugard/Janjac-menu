<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>La carte</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Caveat:wght@600;700&family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600&family=Work+Sans:wght@400;500;600&display=swap');

  :root{
    --bg:#182922; --bg2:#132019;
    --chalk:#f2efe3; --chalk-dim:#b7c2b6;
    --gold:#e3b23c; --rust:#c1543a;
    --wipe:rgba(242,239,227,0.55); --line:rgba(242,239,227,0.16);
    --frame:#5b4130; --frame-dark:#3a2a1e; --radius:8px;
  }
  body.light-theme{
    --bg:#f4efe3; --bg2:#fffdf8;
    --chalk:#2b2118; --chalk-dim:#6b5f4f;
    --gold:#a9791f; --rust:#b3492f;
    --wipe:rgba(43,33,24,0.35); --line:rgba(43,33,24,0.14);
    --frame:#c9a877; --frame-dark:#a8865a;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    font-family:'Work Sans', sans-serif;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(255,255,255,0.03), transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(255,255,255,0.025), transparent 55%),
      var(--bg);
    color:var(--chalk);
    min-height:100vh;
    padding:18px 14px 60px;
  }
  .frame{
    max-width:640px; margin:0 auto;
    border:3px solid var(--frame); border-radius:var(--radius);
    box-shadow:0 0 0 6px var(--frame-dark), 0 20px 50px rgba(0,0,0,0.45);
    background:var(--bg2); padding:28px 22px 22px; position:relative;
  }
  .theme-toggle{
    position:absolute; top:16px; left:16px; width:32px; height:32px; border-radius:50%;
    background:rgba(242,239,227,0.06); border:1px solid var(--line); color:var(--chalk);
    font-size:1rem; display:flex; align-items:center; justify-content:center; cursor:pointer; padding:0;
  }
  .theme-toggle:hover{ background:rgba(242,239,227,0.12); }

  .call-server-btn{
    position:fixed; bottom:20px; right:20px; z-index:40; background:var(--gold); color:#20180a;
    border:none; border-radius:24px; padding:12px 18px; font-weight:600; font-size:0.85rem;
    box-shadow:0 6px 18px rgba(0,0,0,0.3); cursor:pointer; font-family:'Work Sans', sans-serif;
  }
  .call-server-btn:disabled{ opacity:0.5; cursor:not-allowed; }
  .call-server-btn:not(:disabled):active{ transform:scale(0.96); }
  .lang-toggle{
    position:absolute; top:16px; right:16px;
  }
  .lang-current{
    width:34px; height:34px; border-radius:50%; border:1px solid var(--line);
    background:rgba(242,239,227,0.06); font-size:1.15rem; cursor:pointer; padding:0;
    display:flex; align-items:center; justify-content:center; line-height:1;
  }
  .lang-current:hover{ background:rgba(242,239,227,0.12); }
  .lang-dropdown{
    display:none; position:absolute; top:40px; right:0; flex-direction:column; gap:4px;
    background:var(--bg2); border:1px solid var(--line); border-radius:12px; padding:6px;
    box-shadow:0 8px 20px rgba(0,0,0,0.25); z-index:20;
  }
  .lang-dropdown.open{ display:flex; }
  .lang-flag-btn{
    width:34px; height:34px; border-radius:50%; border:1px solid transparent; background:transparent;
    font-size:1.15rem; cursor:pointer; padding:0; display:flex; align-items:center; justify-content:center; line-height:1;
  }
  .lang-flag-btn:hover{ background:rgba(242,239,227,0.08); border-color:var(--line); }

  .restaurant-name{ font-family:'Caveat', cursive; font-weight:700; font-size:2.6rem; text-align:center; margin:0 0 2px; text-shadow:0 0 14px rgba(242,239,227,0.15); }
  .subtitle{ text-align:center; color:var(--chalk-dim); font-size:0.78rem; letter-spacing:2px; text-transform:uppercase; margin-bottom:18px; }
  .divider{ height:1px; background:var(--line); margin:14px 0 18px; position:relative; }
  .divider::after{ content:'❧'; position:absolute; left:50%; top:50%; transform:translate(-50%,-52%); background:var(--bg2); padding:0 10px; color:var(--gold); font-size:0.9rem; }

  /* Header nav (jump to sections) */
  .site-nav{
    position:sticky; top:-1px; z-index:10; display:flex; gap:6px;
    background:var(--bg2); padding:8px 0 12px; margin-bottom:6px;
    border-bottom:1px solid var(--line);
  }
  .site-nav button{
    flex:1; background:rgba(242,239,227,0.05); border:1px solid var(--line); color:var(--chalk-dim);
    border-radius:20px; padding:7px 6px; font-size:0.76rem; font-weight:600; cursor:pointer;
    font-family:'Work Sans', sans-serif; letter-spacing:0.3px; transition:background .15s, color .15s;
  }
  .site-nav button:hover, .site-nav button.active{ background:var(--gold); color:#20180a; border-color:var(--gold); }
  .site-nav button:active{ transform:scale(0.96); }

  .section-anchor{ scroll-margin-top:56px; }

  /* Search & filters */
  .filter-bar{ margin-bottom:14px; }
  .search-input{
    width:100%; background:rgba(242,239,227,0.05); border:1px solid var(--line); color:var(--chalk);
    border-radius:20px; padding:9px 14px; font-size:0.88rem; font-family:'Work Sans', sans-serif; margin-bottom:8px;
  }
  .search-input::placeholder{ color:var(--chalk-dim); }
  .tag-chip{
    background:rgba(242,239,227,0.05); border:1px solid var(--line); color:var(--chalk-dim);
    border-radius:14px; padding:4px 11px; font-size:0.78rem; cursor:pointer; user-select:none;
  }
  .tag-chip.active{ background:var(--gold); color:#20180a; border-color:var(--gold); font-weight:600; }
  .allergen-filter{ margin-top:8px; }
  .allergen-filter summary{ cursor:pointer; font-size:0.78rem; color:var(--chalk-dim); list-style:none; user-select:none; padding:4px 0; }
  .allergen-filter summary::-webkit-details-marker{ display:none; }
  .allergen-filter[open] summary{ margin-bottom:6px; }

  /* Item photo */
  .item-body{ display:flex; gap:10px; align-items:flex-start; }
  .item-photo{ width:56px; height:56px; border-radius:6px; object-fit:cover; flex-shrink:0; border:1px solid var(--line); }
  .item-content{ flex:1; min-width:0; }

  .category{ margin-bottom:22px; }
  .category-name{ font-family:'Caveat', cursive; font-weight:700; font-size:1.7rem; color:var(--gold); margin:0 0 10px; }
  .section-title{ font-family:'Caveat', cursive; font-weight:700; font-size:2.1rem; color:var(--chalk); text-align:center; margin:8px 0 4px; }

  .item{ position:relative; padding:9px 6px; border-radius:6px; transition:background .15s; }
  .item:active{ background:rgba(242,239,227,0.04); }
  .item-row{ display:flex; align-items:baseline; gap:8px; }
  .item-name{ font-family:'Fraunces', serif; font-size:1.05rem; font-weight:500; }
  .item-name-wrap{ display:flex; align-items:baseline; gap:5px; white-space:nowrap; }
  .item-tag{ font-size:0.9rem; }
  .item-leader{ flex:1; border-bottom:1px dotted var(--chalk-dim); margin-bottom:4px; opacity:0.5; }
  .item-price{ font-family:'Fraunces', serif; color:var(--gold); font-weight:600; font-size:1rem; white-space:nowrap; }
  .item-desc{ font-size:0.83rem; color:var(--chalk-dim); margin-top:2px; line-height:1.35; max-width:92%; }

  .allergen-btn{
    flex-shrink:0; width:16px; height:16px; border-radius:50%; border:1px solid var(--chalk-dim);
    color:var(--chalk-dim); font-size:0.62rem; line-height:14px; text-align:center; cursor:pointer;
    background:transparent; padding:0; font-family:'Work Sans', sans-serif; font-style:italic;
  }
  .allergen-btn:hover{ color:var(--gold); border-color:var(--gold); }
  .allergen-info{ display:none; font-size:0.76rem; color:var(--gold); opacity:0.9; margin-top:3px; font-style:italic; }
  .allergen-info.show{ display:block; }

  .item.out-of-stock .item-name, .item.out-of-stock .item-desc, .item.out-of-stock .item-price{
    opacity:0.38; text-decoration:line-through; text-decoration-color:var(--wipe); text-decoration-thickness:3px;
  }
  .item.out-of-stock::before{
    content:''; position:absolute; left:-4%; top:38%; width:108%; height:20px;
    background:linear-gradient(100deg, transparent, var(--wipe) 35%, var(--wipe) 65%, transparent);
    filter:blur(5px); transform:rotate(-2deg); pointer-events:none; mix-blend-mode:overlay;
  }
  .sold-out-tag{
    position:absolute; right:2px; top:-6px; font-family:'Caveat', cursive; font-weight:700; font-size:0.95rem;
    color:var(--rust); border:1.5px solid var(--rust); border-radius:5px; padding:0 7px;
    transform:rotate(-6deg); background:rgba(193,84,58,0.08);
  }
  .empty-note{ text-align:center; color:var(--chalk-dim); font-size:0.85rem; font-style:italic; padding:20px 0; }
  .formula-section{ margin-bottom:24px; }
  .formula-note{ font-size:0.78rem; color:var(--gold); font-style:italic; margin-top:10px; line-height:1.4; opacity:0.9; }
  .story-section{ margin-bottom:22px; }
  .story-text{ font-size:0.88rem; color:var(--chalk-dim); line-height:1.6; white-space:pre-line; }
  .mgr-note-block{ margin-bottom:16px; }
  .mgr-note-block textarea{ min-height:44px; }
  .footer-link{ text-align:center; margin-top:26px; font-size:0.72rem; }
  .footer-link a{ color:var(--chalk-dim); text-decoration:none; border-bottom:1px dotted var(--chalk-dim); opacity:0.7; cursor:pointer; }
  .footer-link a:hover{ opacity:1; }

  /* Mocktail signature builder (client) */
  .mocktail-box{ border:1px dashed var(--gold); border-radius:8px; padding:14px 14px 8px; margin-bottom:22px; }
  .mocktail-intro{ font-size:0.84rem; color:var(--chalk-dim); line-height:1.4; margin-bottom:12px; }
  .mocktail-col-title{ font-size:0.72rem; text-transform:uppercase; letter-spacing:1.5px; color:var(--gold); margin-bottom:6px; }
  .mocktail-group{ margin-bottom:12px; }
  .chip-row{ display:flex; flex-wrap:wrap; gap:6px; }
  .chip{ background:rgba(242,239,227,0.07); border:1px solid var(--line); color:var(--chalk); border-radius:14px; padding:4px 11px; font-size:0.8rem; }
  .chip .chip-price{ color:var(--gold); margin-left:5px; font-weight:600; }

  /* Coups de coeur */
  .highlight-box{ border:1.5px solid var(--gold); border-radius:8px; padding:14px 14px 6px; margin-bottom:22px; background:rgba(227,178,60,0.06); }
  .highlight-title{ font-family:'Caveat', cursive; font-weight:700; font-size:1.9rem; color:var(--gold); text-align:center; margin:0 0 8px; }

  .mgr-header{ display:flex; align-items:center; justify-content:space-between; margin-bottom:6px; }
  .mgr-title{ font-family:'Caveat', cursive; font-size:1.9rem; }
  .btn{ font-family:'Work Sans', sans-serif; font-size:0.82rem; font-weight:500; padding:8px 14px; border-radius:6px; border:1px solid var(--line); background:transparent; color:var(--chalk); cursor:pointer; transition:background .15s, transform .1s; }
  .btn:hover{ background:rgba(242,239,227,0.06); }
  .btn:active{ transform:scale(0.96); }
  .btn-gold{ background:var(--gold); color:#20180a; border:none; font-weight:600; }
  .btn-gold:hover{ filter:brightness(1.08); }
  .btn-rust{ background:transparent; color:var(--rust); border:1px solid var(--rust); }
  .btn-small{ padding:5px 10px; font-size:0.75rem; }

  input:focus-visible, textarea:focus-visible, select:focus-visible, button:focus-visible{
    outline:2px solid var(--gold); outline-offset:1px;
  }

  .tabs{ display:flex; gap:6px; margin:14px 0 18px; flex-wrap:wrap; }
  .tab{ flex:1; min-width:70px; text-align:center; padding:8px 4px; border-radius:6px; font-size:0.82rem; font-weight:500; cursor:pointer; border:1px solid var(--line); color:var(--chalk-dim); }
  .tab.active{ background:var(--gold); color:#20180a; border-color:var(--gold); font-weight:600; }
  .tab-badge{ background:var(--rust); color:#fff; border-radius:10px; padding:0 6px; font-size:0.68rem; font-weight:700; }

  .mgr-subhead{ font-family:'Caveat', cursive; font-size:1.5rem; color:var(--gold); margin:16px 0 6px; }
  .mgr-hint{ font-size:0.72rem; color:var(--chalk-dim); opacity:0.8; margin:-4px 0 10px; }

  .mgr-cat{ border:1px solid var(--line); border-radius:8px; padding:12px 12px 14px; margin-bottom:14px; background:rgba(242,239,227,0.025); box-shadow:0 2px 8px rgba(0,0,0,0.15); }
  .mgr-cat.sortable-ghost{ opacity:0.35; }
  .mgr-cat-head{ display:flex; justify-content:space-between; align-items:center; margin-bottom:8px; gap:8px; }
  .mgr-cat-names{ display:flex; flex-direction:column; gap:2px; width:60%; }
  .mgr-cat-head input{ font-family:'Caveat', cursive; font-size:1.25rem; background:transparent; border:none; border-bottom:1px dashed var(--line); color:var(--gold); padding:2px 0; width:100%; }
  .mgr-cat-head input.en{ color:var(--chalk-dim); font-size:1.05rem; }
  .lang-tag{ font-size:0.62rem; color:var(--chalk-dim); text-transform:uppercase; letter-spacing:1px; margin-bottom:2px; }
  .kind-badge{ font-size:0.62rem; text-transform:uppercase; letter-spacing:1px; color:#20180a; background:var(--chalk-dim); border-radius:4px; padding:2px 6px; white-space:nowrap; }
  .kind-badge.boisson{ background:var(--gold); }
  .drag-handle{ cursor:grab; color:var(--chalk-dim); font-size:1.1rem; padding:2px 6px; user-select:none; touch-action:none; }
  .drag-handle:active{ cursor:grabbing; }
  .cat-head-left{ display:flex; align-items:center; gap:6px; }

  .mgr-item{ display:flex; flex-direction:column; gap:6px; padding:10px 8px; border-top:1px solid var(--line); background:rgba(242,239,227,0.02); border-radius:6px; margin-top:4px; }
  .mgr-item.sortable-ghost{ opacity:0.35; }
  .mgr-item-top{ display:flex; gap:8px; align-items:center; }
  .mgr-item input[type=text], .mgr-item textarea, .mgr-item select{
    background:rgba(242,239,227,0.05); border:1px solid var(--line); color:var(--chalk); border-radius:5px;
    padding:6px 8px; font-family:'Work Sans', sans-serif; font-size:0.85rem; width:100%;
  }
  .mgr-item textarea{ resize:vertical; min-height:36px; }
  .field-name{ flex:2; } .field-price{ flex:0 0 78px; } .field-tag{ flex:0 0 108px; }
  .field-block{ display:flex; flex-direction:column; gap:1px; width:100%; }
  .toggle-row{ display:flex; align-items:center; justify-content:space-between; margin-top:2px; }
  .toggle{ display:flex; align-items:center; gap:8px; cursor:pointer; user-select:none; font-size:0.82rem; }
  .switch{ width:42px; height:24px; border-radius:14px; background:rgba(242,239,227,0.15); position:relative; transition:background .15s; flex-shrink:0; }
  .switch::after{ content:''; position:absolute; top:3px; left:3px; width:18px; height:18px; border-radius:50%; background:var(--chalk); transition:transform .15s; }
  .switch.off{ background:rgba(193,84,58,0.35); }
  .switch.off::after{ transform:translateX(18px); background:var(--rust); }
  .item-actions{ display:flex; gap:6px; }
  .add-item-btn{ margin-top:8px; background:transparent; border:1px dashed var(--line); color:var(--chalk-dim); border-radius:5px; padding:7px; width:100%; cursor:pointer; font-size:0.8rem; }
  .add-item-btn:hover{ color:var(--chalk); border-color:var(--chalk-dim); }
  .new-cat-row{ display:flex; gap:8px; margin-top:4px; }
  .new-cat-row input{ flex:1; background:rgba(242,239,227,0.05); border:1px solid var(--line); color:var(--chalk); border-radius:5px; padding:8px 10px; font-size:0.85rem; }

  .translations-block{ border:1px dashed var(--line); border-radius:6px; padding:0 8px 8px; margin-top:2px; }
  .translations-block summary{ cursor:pointer; padding:8px 0; font-size:0.78rem; color:var(--chalk-dim); list-style:none; user-select:none; }
  .translations-block summary::-webkit-details-marker{ display:none; }
  .translations-block summary::before{ content:'▸ '; color:var(--gold); }
  .translations-block[open] summary::before{ content:'▾ '; }
  .translations-block[open] summary{ border-bottom:1px solid var(--line); margin-bottom:8px; }
  .translations-block .lang-group{ margin-bottom:8px; }
  .translations-block .lang-group:last-child{ margin-bottom:0; }

  .photo-row{ display:flex; gap:8px; align-items:center; }
  .photo-row input{ flex:1; }
  .photo-preview{ width:40px; height:40px; border-radius:5px; object-fit:cover; border:1px solid var(--line); flex-shrink:0; }

  .allergen-grid{ display:flex; flex-wrap:wrap; gap:5px; margin:4px 0; }
  .allergen-chip{ display:flex; align-items:center; gap:4px; background:rgba(242,239,227,0.05); border:1px solid var(--line); border-radius:12px; padding:3px 9px 3px 6px; font-size:0.72rem; color:var(--chalk-dim); cursor:pointer; }
  .allergen-chip input{ margin:0; accent-color:var(--gold); }
  .allergen-chip.checked{ color:var(--chalk); border-color:var(--gold); }

  .login-screen{ text-align:center; padding:30px 10px; }
  .login-screen p{ color:var(--chalk-dim); font-size:0.85rem; margin-bottom:14px; }
  .login-field{ width:100%; max-width:280px; margin:0 auto 10px; display:block; text-align:left; padding:10px 12px; border-radius:6px; border:1px solid var(--line); background:rgba(242,239,227,0.05); color:var(--chalk); font-size:0.9rem; }
  .login-error{ color:var(--rust); font-size:0.8rem; min-height:18px; }

  .link-row{ display:flex; gap:6px; margin-top:12px; align-items:center; background:rgba(242,239,227,0.05); border-radius:6px; padding:8px 10px; }
  .link-row input{ flex:1; background:transparent; border:none; color:var(--chalk-dim); font-size:0.78rem; }

  .toast{ position:fixed; bottom:20px; left:50%; transform:translateX(-50%); background:var(--gold); color:#20180a; padding:9px 18px; border-radius:20px; font-size:0.82rem; font-weight:600; opacity:0; pointer-events:none; transition:opacity .25s; z-index:50; }
  .toast.show{ opacity:1; }

  .settings-row{ margin-bottom:14px; }
  .settings-row label{ font-size:0.75rem; color:var(--chalk-dim); display:block; margin-bottom:4px; }
  .settings-row input{ width:100%; background:rgba(242,239,227,0.05); border:1px solid var(--line); color:var(--chalk); border-radius:5px; padding:8px 10px; font-size:0.9rem; }
  .qr-box{ text-align:center; padding:10px 0 4px; }
  .qr-box canvas, .qr-box img{ background:#fff; padding:12px; border-radius:8px; }

  /* Kitchen printable sheet — always plain black on white, ignores theme */
  .kitchen-print{ background:#fff; color:#111; max-width:700px; margin:0 auto; padding:28px; font-family:Arial, Helvetica, sans-serif; border-radius:8px; }
  .kitchen-print h1{ font-size:1.4rem; margin:0 0 2px; }
  .kitchen-print .kp-date{ color:#666; font-size:0.85rem; margin:0 0 16px; text-transform:capitalize; }
  .kitchen-print h2{ font-size:1.1rem; border-bottom:2px solid #222; padding-bottom:4px; margin:22px 0 8px; }
  .kitchen-print h3{ font-size:0.95rem; color:#333; margin:14px 0 4px; }
  .kitchen-print ul{ margin:0 0 6px; padding-left:18px; }
  .kitchen-print li{ margin-bottom:6px; font-size:0.88rem; line-height:1.4; }
  .kitchen-print .kp-rupture{ color:#b3492f; font-weight:700; }
  .kitchen-print .kp-allergens{ color:#666; font-size:0.78rem; font-style:italic; }
  .kp-header{ display:flex; justify-content:space-between; gap:8px; margin-bottom:16px; }
  @media print{
    body{ background:#fff !important; padding:0; }
    .no-print{ display:none !important; }
    .kitchen-print{ box-shadow:none; padding:0; }
  }
</style>
</head>
<body>
<div id="app"><div class="frame"><div class="empty-note">Chargement de la carte…</div></div></div>

<script type="module">
import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';
import { SUPABASE_URL, SUPABASE_ANON_KEY } from './config.js';

const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const app = document.getElementById('app');

// ---------- Languages ----------
const LANGS = ['fr','en','es','de'];
const LANG_LABEL = { fr:'FR', en:'EN', es:'ES', de:'DE' };
const LANG_FLAG = { fr:'🇫🇷', en:'🇬🇧', es:'🇪🇸', de:'🇩🇪' };
const EXTRA_LANGS = LANGS.filter(l => l !== 'fr'); // used in manager "translations" blocks

// tr(obj, 'name', 'es')  ->  obj.name_es if present, else obj.name_fr (fallback)
function tr(obj, field, lang){
  if(!obj) return '';
  if(lang !== 'fr' && obj[`${field}_${lang}`]) return obj[`${field}_${lang}`];
  return obj[`${field}_fr`] || '';
}

const UI = {
  subtitle:     { fr:"La carte du jour", en:"Today's menu", es:"El menú del día", de:"Heutige Karte" },
  formulas:     { fr:"Nos Formules", en:"Set Menus", es:"Nuestros Menús", de:"Unsere Menüs" },
  drinks:       { fr:"Boissons", en:"Drinks", es:"Bebidas", de:"Getränke" },
  food:         { fr:"Plats", en:"Food", es:"Platos", de:"Gerichte" },
  soldOut:      { fr:"épuisé", en:"sold out", es:"agotado", de:"ausverkauft" },
  emptyMenu:    { fr:"La carte sera affichée ici dès que le gérant l'aura complétée.", en:"The menu will appear here once the manager has filled it in.", es:"La carta aparecerá aquí en cuanto el gerente la complete.", de:"Die Karte wird hier angezeigt, sobald der Manager sie ausgefüllt hat." },

  allergens:    { fr:"Allergènes", en:"Allergens", es:"Alérgenos", de:"Allergene" },
  mocktailTitle:{ fr:"Mocktails Signature", en:"Signature Mocktails", es:"Mocktails Signature", de:"Signature Mocktails" },
  highlights:   { fr:"Coups de Cœur", en:"Chef's Picks", es:"Recomendados", de:"Empfehlungen" },
  searchPlaceholder: { fr:"Rechercher un plat…", en:"Search the menu…", es:"Buscar en la carta…", de:"Speisekarte durchsuchen…" },
  all:          { fr:"Tous", en:"All", es:"Todos", de:"Alle" },
  allergenFilter:{ fr:"Filtrer les allergènes", en:"Filter allergens", es:"Filtrar alérgenos", de:"Allergene filtern" },
  noResults:    { fr:"Aucun résultat pour votre recherche.", en:"No results found.", es:"No se encontraron resultados.", de:"Keine Ergebnisse gefunden." },
  storyTitle:   { fr:"Notre Histoire", en:"Our Story", es:"Nuestra Historia", de:"Unsere Geschichte" },
  callServerBtn:{ fr:"🔔 Appeler un serveur", en:"🔔 Call a waiter", es:"🔔 Llamar a un camarero", de:"🔔 Kellner rufen" },
  askTableNumber:{ fr:"Numéro de table (optionnel) :", en:"Table number (optional):", es:"Número de mesa (opcional):", de:"Tischnummer (optional):" },
  callSent:     { fr:"Un serveur a été prévenu, merci de patienter 🙏", en:"A waiter has been notified, thank you for your patience 🙏", es:"Se ha avisado a un camarero, gracias por su paciencia 🙏", de:"Ein Kellner wurde benachrichtigt, danke für Ihre Geduld 🙏" },
  callCooldown: { fr:"Un serveur a déjà été prévenu, merci de patienter.", en:"A waiter has already been notified, please wait.", es:"Ya se ha avisado a un camarero, por favor espere.", de:"Ein Kellner wurde bereits benachrichtigt, bitte warten Sie." },
};
function t(key, L){ return (UI[key] && (UI[key][L] || UI[key].fr)) || ''; }

const TAGS = {
  '':      { emoji: '',   fr:'Aucun',        en:'None',       es:'Ninguno',     de:'Keine' },
  coeur:   { emoji: '❤️', fr:'Coup de cœur', en:'Favourite',  es:'Favorito',    de:'Favorit' },
  piment:  { emoji: '🌶️', fr:'Piquant',      en:'Spicy',      es:'Picante',     de:'Scharf' },
  vg:      { emoji: '🌱', fr:'Végé',         en:'Veggie',     es:'Vegetariano', de:'Vegetarisch' },
};
const MOCKTAIL_TYPE_LABEL = {
  sirop:      { fr:'Base sirop',  en:'Syrup base', es:'Base de sirope', de:'Sirup-Basis' },
  soft:       { fr:'Soft',        en:'Soft drink',  es:'Refresco',       de:'Softdrink' },
  supplement: { fr:'Suppléments', en:'Extras',      es:'Extras',         de:'Extras' },
};

// 14 allergènes réglementaires UE
const ALLERGENS_14 = [
  { code:'gluten',       fr:'Gluten',           en:'Gluten',        es:'Gluten',           de:'Gluten' },
  { code:'crustaces',    fr:'Crustacés',        en:'Crustaceans',   es:'Crustáceos',       de:'Krebstiere' },
  { code:'oeufs',        fr:'Œufs',             en:'Eggs',          es:'Huevos',           de:'Eier' },
  { code:'poissons',     fr:'Poissons',         en:'Fish',          es:'Pescado',          de:'Fisch' },
  { code:'arachides',    fr:'Arachides',        en:'Peanuts',       es:'Cacahuetes',       de:'Erdnüsse' },
  { code:'soja',         fr:'Soja',             en:'Soy',           es:'Soja',             de:'Soja' },
  { code:'lait',         fr:'Lait',             en:'Milk',          es:'Leche',            de:'Milch' },
  { code:'fruits_coque', fr:'Fruits à coque',   en:'Tree nuts',     es:'Frutos de cáscara',de:'Schalenfrüchte' },
  { code:'celeri',       fr:'Céleri',           en:'Celery',        es:'Apio',             de:'Sellerie' },
  { code:'moutarde',     fr:'Moutarde',         en:'Mustard',       es:'Mostaza',          de:'Senf' },
  { code:'sesame',       fr:'Sésame',           en:'Sesame',        es:'Sésamo',           de:'Sesam' },
  { code:'sulfites',     fr:'Sulfites',         en:'Sulphites',     es:'Sulfitos',         de:'Sulfite' },
  { code:'lupin',        fr:'Lupin',            en:'Lupin',         es:'Altramuces',       de:'Lupinen' },
  { code:'mollusques',   fr:'Mollusques',       en:'Molluscs',      es:'Moluscos',         de:'Weichtiere' },
];
function allergenLabel(code, L){ const a = ALLERGENS_14.find(a => a.code === code); return a ? (a[L] || a.fr) : code; }

function detectLang(){
  const stored = localStorage.getItem('menuLang');
  if(stored && LANGS.includes(stored)) return stored;
  const nav = ((navigator.language || navigator.userLanguage || 'fr').slice(0,2)).toLowerCase();
  return LANGS.includes(nav) ? nav : 'fr';
}

let state = {
  view: location.hash === '#gestion' ? 'checking' : 'menu',
  lang: detectLang(),
  theme: localStorage.getItem('menuTheme') || 'light',
  langMenuOpen: false,
  settings: null,
  categories: [],
  items: [],
  formulas: [],
  mocktailOptions: [],
  serverCalls: [],
  editingTab: 'menu',
  loginError: '',
  searchQuery: '',
  searchFocused: false,
  tagFilter: '',
  excludedAllergens: [],
};

function applyTheme(){ document.body.classList.toggle('light-theme', state.theme === 'light'); }

function matchesFilter(it){
  const L = state.lang;
  if(state.searchQuery.trim()){
    const q = state.searchQuery.trim().toLowerCase();
    const hay = (tr(it,'name',L) + ' ' + tr(it,'desc',L)).toLowerCase();
    if(!hay.includes(q)) return false;
  }
  if(state.tagFilter && it.tag !== state.tagFilter) return false;
  if(state.excludedAllergens.length && (it.allergens_list||[]).some(a => state.excludedAllergens.includes(a))) return false;
  return true;
}

function esc(s){ return (s||'').replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function showToast(msg){
  let t = document.querySelector('.toast');
  if(!t){ t = document.createElement('div'); t.className='toast'; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add('show');
  clearTimeout(t._timer); t._timer = setTimeout(()=>t.classList.remove('show'), msg.startsWith('Échec') ? 5000 : 2200);
}

async function loadAll(){
  const [{ data: settings }, { data: categories }, { data: items }, { data: formulas }, { data: mocktailOptions }] = await Promise.all([
    supabase.from('restaurant_settings').select('*').eq('id', 1).maybeSingle(),
    supabase.from('categories').select('*').order('sort_order', { ascending: true }).order('created_at', { ascending: true }),
    supabase.from('items').select('*').order('sort_order', { ascending: true }).order('created_at', { ascending: true }),
    supabase.from('formulas').select('*').order('sort_order', { ascending: true }).order('created_at', { ascending: true }),
    supabase.from('mocktail_options').select('*').order('sort_order', { ascending: true }).order('created_at', { ascending: true }),
  ]);
  state.settings = settings || { name_fr: 'Votre Restaurant', name_en: 'Your Restaurant', show_highlights: true };
  state.categories = categories || [];
  state.items = items || [];
  state.formulas = formulas || [];
  state.mocktailOptions = mocktailOptions || [];
}

async function loadServerCalls(){
  const { data, error } = await supabase.from('server_calls').select('*').order('created_at', { ascending: false });
  if(!error) state.serverCalls = data || [];
}

function itemsFor(catId){ return state.items.filter(i => i.category_id === catId); }
function itemsForFiltered(catId){ return itemsFor(catId).filter(matchesFilter); }
function foodCats(){ return state.categories.filter(c => (c.kind||'food') === 'food'); }
function drinkCats(){ return state.categories.filter(c => c.kind === 'boisson'); }
function mocktailOptionsByType(type){ return state.mocktailOptions.filter(o => o.type === type); }

// Renvoie true si l'opération a réussi. Si une erreur Supabase est présente,
// l'affiche clairement (au lieu de l'ignorer silencieusement) et renvoie false.
function checkErr(error, contexte){
  if(error){
    console.error(`Erreur Supabase (${contexte}) :`, error);
    showToast(`Échec — ${contexte} : ${error.message}`);
    return false;
  }
  return true;
}

function render(){
  if(state.view === 'checking') return renderChecking();
  if(state.view === 'menu') return renderMenu();
  if(state.view === 'login') return renderLogin();
  if(state.view === 'manager') return renderManager();
  if(state.view === 'kitchen') return renderKitchen();
}

function renderChecking(){
  app.innerHTML = `<div class="frame"><div class="empty-note">Vérification…</div></div>`;
}

// ---------- shared: render a list of items (food or drinks) ----------
function renderItemsList(items, L){
  let html = '';
  items.forEach(it => {
    const iName = tr(it, 'name', L);
    const iDesc = tr(it, 'desc', L);
    const note = tr(it, 'allergens', L);
    const list = it.allergens_list || [];
    const listLabels = list.map(c => allergenLabel(c, L));
    const allergenText = [...listLabels, ...(note ? [note] : [])].join(', ');
    const tag = TAGS[it.tag || ''];
    const body = `<div class="item-row">
        <span class="item-name-wrap">
          ${tag && tag.emoji ? `<span class="item-tag" title="${esc(tag[L]||tag.fr)}">${tag.emoji}</span>` : ''}
          <span class="item-name">${esc(iName)}</span>
          ${allergenText ? `<button class="allergen-btn" data-allergen-toggle title="${esc(t('allergens', L))}">i</button>` : ''}
        </span>
        <span class="item-leader"></span>
        <span class="item-price">${esc(it.price)}</span>
      </div>
      ${iDesc ? `<div class="item-desc">${esc(iDesc)}</div>` : ''}
      ${allergenText ? `<div class="allergen-info">${esc(t('allergens', L))} : ${esc(allergenText)}</div>` : ''}`;
    html += `<div class="item ${it.out_of_stock ? 'out-of-stock' : ''}">
      ${it.out_of_stock ? `<div class="sold-out-tag">${esc(t('soldOut', L))}</div>` : ''}
      ${it.image_url ? `<div class="item-body">
        <img class="item-photo" src="${esc(it.image_url)}" alt="${esc(iName)}" loading="lazy" onerror="this.style.display='none'">
        <div class="item-content">${body}</div>
      </div>` : body}
    </div>`;
  });
  return html;
}

function renderMocktailBuilder(L){
  if(state.mocktailOptions.length === 0) return '';
  const intro = tr(state.settings, 'mocktail_intro', L);
  let html = `<div class="mocktail-box">
    <div class="category-name">${esc(t('mocktailTitle', L))}</div>
    ${intro ? `<div class="mocktail-intro">${esc(intro)}</div>` : ''}`;
  ['sirop','soft','supplement'].forEach(type => {
    const opts = mocktailOptionsByType(type);
    if(opts.length === 0) return;
    const label = MOCKTAIL_TYPE_LABEL[type];
    html += `<div class="mocktail-group">
      <div class="mocktail-col-title">${esc(label[L]||label.fr)}</div>
      <div class="chip-row">`;
    opts.forEach(o => {
      const oName = tr(o, 'name', L);
      html += `<span class="chip">${esc(oName)}${o.price ? `<span class="chip-price">${esc(o.price)}</span>` : ''}</span>`;
    });
    html += `</div></div>`;
  });
  html += `</div>`;
  return html;
}

function getHighlights(){ return state.items.filter(i => i.tag === 'coeur' && !i.out_of_stock).filter(matchesFilter); }

function renderHighlights(L){
  if(state.settings.show_highlights === false) return '';
  const items = getHighlights();
  if(items.length === 0) return '';
  return `<div class="highlight-box">
    <div class="highlight-title">❤️ ${esc(t('highlights', L))}</div>
    ${renderItemsList(items, L)}
  </div>`;
}

function renderKitchen(){
  const today = new Date().toLocaleDateString('fr-FR', { weekday:'long', year:'numeric', month:'long', day:'numeric' });
  let html = `<div class="kitchen-print">
    <div class="kp-header no-print">
      <button class="btn btn-small" id="kp-back">← Retour à la gestion</button>
      <button class="btn btn-gold btn-small" id="kp-print">🖨 Imprimer / Enregistrer en PDF</button>
    </div>
    <h1>${esc(state.settings.name_fr)} — Fiche cuisine</h1>
    <p class="kp-date">${esc(today)}</p>`;

  if(state.formulas.length){
    html += `<h2>Formules</h2><ul>`;
    state.formulas.forEach(f => { html += `<li><strong>${esc(f.name_fr)}</strong> — ${esc(f.price)}</li>`; });
    html += `</ul>`;
  }

  [['🍽 Plats', foodCats()], ['🍹 Boissons', drinkCats()]].forEach(([label, cats]) => {
    const withItems = cats.filter(c => itemsFor(c.id).length > 0);
    if(withItems.length === 0) return;
    html += `<h2>${label}</h2>`;
    withItems.forEach(cat => {
      html += `<h3>${esc(cat.name_fr)}</h3><ul>`;
      itemsFor(cat.id).forEach(it => {
        const tag = TAGS[it.tag || ''];
        const allergenCodes = (it.allergens_list||[]).map(c => allergenLabel(c,'fr'));
        const allergenNote = [...allergenCodes, ...(it.allergens_fr ? [it.allergens_fr] : [])].join(', ');
        html += `<li>
          <strong>${esc(it.name_fr)}</strong>${tag && tag.emoji ? ' ' + tag.emoji : ''} — ${esc(it.price)}
          ${it.out_of_stock ? ' <span class="kp-rupture">RUPTURE</span>' : ''}
          ${allergenNote ? `<br><span class="kp-allergens">Allergènes : ${esc(allergenNote)}</span>` : ''}
        </li>`;
      });
      html += `</ul>`;
    });
  });

  if(state.mocktailOptions.length){
    html += `<h2>Mocktails Signature — options</h2>`;
    ['sirop','soft','supplement'].forEach(type => {
      const opts = mocktailOptionsByType(type);
      if(opts.length === 0) return;
      html += `<h3>${MOCKTAIL_TYPE_LABEL[type].fr}</h3><ul>`;
      opts.forEach(o => { html += `<li>${esc(o.name_fr)}${o.price ? ' — ' + esc(o.price) : ''}</li>`; });
      html += `</ul>`;
    });
  }

  html += `</div>`;
  app.innerHTML = html;
  document.getElementById('kp-back').onclick = () => { state.view = 'manager'; render(); };
  document.getElementById('kp-print').onclick = () => window.print();
}

// ---------- CUSTOMER MENU ----------
function renderMenu(){
  applyTheme();
  const L = state.lang;
  const name = tr(state.settings, 'name', L);
  const fCats = foodCats().filter(c => itemsForFiltered(c.id).length > 0);
  const dCats = drinkCats().filter(c => itemsForFiltered(c.id).length > 0);
  const hasFormulas = state.formulas.length > 0 && !state.searchQuery.trim() && !state.tagFilter && !state.excludedAllergens.length;
  const hasFood = fCats.length > 0;
  const hasDrinks = dCats.length > 0 || (state.mocktailOptions.length > 0 && !state.searchQuery.trim() && !state.tagFilter && !state.excludedAllergens.length);
  const filterActive = !!(state.searchQuery.trim() || state.tagFilter || state.excludedAllergens.length);
  const noResults = filterActive && !hasFormulas && !hasFood && !hasDrinks;

  const quickTags = ['coeur','piment','vg'];

  let html = `<div class="frame">
    <button class="theme-toggle" id="theme-toggle-btn" title="Changer le thème">${state.theme==='light' ? '🌙' : '☀️'}</button>
    <div class="lang-toggle">
      <button class="lang-current" id="lang-current-btn" title="Changer de langue">${LANG_FLAG[L]}</button>
      <div class="lang-dropdown ${state.langMenuOpen ? 'open' : ''}">
        ${LANGS.filter(l => l !== L).map(l => `<button class="lang-flag-btn" data-lang="${l}" title="${LANG_LABEL[l]}">${LANG_FLAG[l]}</button>`).join('')}
      </div>
    </div>
    <div class="restaurant-name">${esc(name)}</div>
    <div class="subtitle">${esc(t('subtitle', L))}</div>
    <div class="site-nav">
      ${hasFormulas ? `<button data-jump="sec-formules">📋 ${esc(t('formulas', L))}</button>` : ''}
      ${hasFood ? `<button data-jump="sec-plats">🍽 ${esc(t('food', L))}</button>` : ''}
      ${hasDrinks ? `<button data-jump="sec-boissons">🍷 ${esc(t('drinks', L))}</button>` : ''}
    </div>

    <div class="filter-bar">
      <input type="search" id="search-input" class="search-input" placeholder="🔍 ${esc(t('searchPlaceholder', L))}" value="${esc(state.searchQuery)}">
      <div class="chip-row">
        <span class="tag-chip ${state.tagFilter===''?'active':''}" data-tag-filter="">${esc(t('all', L))}</span>
        ${quickTags.map(k => `<span class="tag-chip ${state.tagFilter===k?'active':''}" data-tag-filter="${k}">${TAGS[k].emoji} ${esc(TAGS[k][L]||TAGS[k].fr)}</span>`).join('')}
      </div>
      <details class="allergen-filter">
        <summary>🚫 ${esc(t('allergenFilter', L))}${state.excludedAllergens.length ? ` (${state.excludedAllergens.length})` : ''}</summary>
        <div class="allergen-grid">
          ${ALLERGENS_14.map(a => `<label class="allergen-chip ${state.excludedAllergens.includes(a.code)?'checked':''}">
            <input type="checkbox" data-exclude-allergen="${a.code}" ${state.excludedAllergens.includes(a.code)?'checked':''}> ${esc(a[L]||a.fr)}
          </label>`).join('')}
        </div>
      </details>
    </div>
    ${renderHighlights(L)}`;

  if(noResults){
    html += `<div class="empty-note">${esc(t('noResults', L))}</div>`;
  }

  if(hasFormulas){
    const note = tr(state.settings, 'formulas_note', L);
    html += `<div class="formula-section section-anchor" id="sec-formules">
      <div class="category-name">${esc(t('formulas', L))}</div>`;
    state.formulas.forEach(f => {
      const fName = tr(f, 'name', L);
      html += `<div class="item">
        <div class="item-row">
          <span class="item-name">${esc(fName)}</span>
          <span class="item-leader"></span>
          <span class="item-price">${esc(f.price)}</span>
        </div>
      </div>`;
    });
    if(note){ html += `<div class="formula-note">${esc(note)}</div>`; }
    html += `</div><div class="divider"></div>`;
  }

  html += `<div class="section-anchor" id="sec-plats">`;
  if(!hasFood){
    if(!hasFormulas && !filterActive) html += `<div class="empty-note">${esc(t('emptyMenu', L))}</div>`;
  } else {
    fCats.forEach(cat => {
      const catName = tr(cat, 'name', L);
      html += `<div class="category"><div class="category-name">${esc(catName)}</div>`;
      html += renderItemsList(itemsForFiltered(cat.id), L);
      html += `</div>`;
    });
  }
  html += `</div>`;

  if(hasDrinks){
    html += `<div class="divider"></div><div class="section-anchor" id="sec-boissons">
      <div class="section-title">${esc(t('drinks', L))}</div>`;
    let mocktailInserted = false;
    dCats.forEach(cat => {
      const catName = tr(cat, 'name', L);
      html += `<div class="category"><div class="category-name">${esc(catName)}</div>`;
      html += renderItemsList(itemsForFiltered(cat.id), L);
      html += `</div>`;
      if(!mocktailInserted && /cocktail/i.test(cat.name_fr + ' ' + (cat.name_en||''))){
        html += renderMocktailBuilder(L);
        mocktailInserted = true;
      }
    });
    if(!mocktailInserted && !filterActive) html += renderMocktailBuilder(L);
    html += `</div>`;
  }

  const story = tr(state.settings, 'story', L);
  if(story && !filterActive){
    html += `<div class="divider"></div><div class="story-section section-anchor" id="sec-histoire">
      <div class="category-name">${esc(t('storyTitle', L))}</div>
      <div class="story-text">${esc(story)}</div>
    </div>`;
  }

  if(state.settings.instagram_url){
    html += `<div class="footer-link"><a href="${esc(state.settings.instagram_url)}" target="_blank" rel="noopener">📷 Instagram</a></div>`;
  }

  html += `<div class="footer-link"><a id="mgr-link">${esc(t('managerArea', L))}</a></div></div>
  <button class="call-server-btn" id="call-server-btn">${esc(t('callServerBtn', L))}</button>`;
  app.innerHTML = html;
  document.querySelectorAll('[data-lang]').forEach(b => b.onclick = () => { state.lang = b.dataset.lang; state.langMenuOpen = false; localStorage.setItem('menuLang', state.lang); render(); });
  document.getElementById('lang-current-btn').onclick = (e) => { e.stopPropagation(); state.langMenuOpen = !state.langMenuOpen; render(); };
  if(state.langMenuOpen){
    setTimeout(() => {
      document.addEventListener('click', function closeLangMenu(e){
        if(!e.target.closest('.lang-toggle')){ state.langMenuOpen = false; render(); }
        document.removeEventListener('click', closeLangMenu);
      }, { once: true });
    }, 0);
  }
  document.querySelectorAll('[data-jump]').forEach(b => b.onclick = () => {
    document.getElementById(b.dataset.jump).scrollIntoView({ behavior: 'smooth' });
  });
  document.querySelectorAll('[data-allergen-toggle]').forEach(btn => btn.onclick = () => {
    const info = btn.closest('.item').querySelector('.allergen-info');
    if(info) info.classList.toggle('show');
  });
  document.getElementById('theme-toggle-btn').onclick = () => {
    state.theme = state.theme === 'light' ? 'dark' : 'light';
    localStorage.setItem('menuTheme', state.theme);
    render();
  };
  const searchInput = document.getElementById('search-input');
  searchInput.oninput = () => { state.searchQuery = searchInput.value; state.searchFocused = true; render(); };
  searchInput.onfocus = () => { state.searchFocused = true; };
  searchInput.onblur = () => { state.searchFocused = false; };
  if(state.searchFocused){ searchInput.focus(); const v = searchInput.value; searchInput.setSelectionRange(v.length, v.length); }
  document.querySelectorAll('[data-tag-filter]').forEach(chip => chip.onclick = () => {
    state.tagFilter = state.tagFilter === chip.dataset.tagFilter ? '' : chip.dataset.tagFilter;
    render();
  });
  document.querySelectorAll('[data-exclude-allergen]').forEach(cb => cb.onchange = () => {
    const code = cb.dataset.excludeAllergen;
    if(cb.checked){ if(!state.excludedAllergens.includes(code)) state.excludedAllergens.push(code); }
    else { state.excludedAllergens = state.excludedAllergens.filter(c => c !== code); }
    render();
  });
  document.getElementById('mgr-link').onclick = async () => {
    location.hash = 'gestion';
    const { data: { session } } = await supabase.auth.getSession();
    state.view = session ? 'manager' : 'login';
    if(session) await loadServerCalls();
    render();
  };
  const callBtn = document.getElementById('call-server-btn');
  callBtn.onclick = async () => {
    const tableLabel = window.prompt(t('askTableNumber', L));
    if(tableLabel === null) return;
    callBtn.disabled = true;
    const { error } = await supabase.from('server_calls').insert({ table_label: tableLabel.trim() });
    if(error){ checkErr(error, "appel du serveur"); callBtn.disabled = false; return; }
    showToast(t('callSent', L));
    setTimeout(() => { const b = document.getElementById('call-server-btn'); if(b) b.disabled = false; }, 60000);
  };
}

// Compact block for EN/ES/DE translations of a text/textarea field set
function translationsBlock(kind, obj, idAttr, fields){
  // fields: array of {field, type: 'input'|'textarea', placeholder(lang)=>string}
  let html = `<details class="translations-block"><summary>🌍 Traductions (${EXTRA_LANGS.map(l=>LANG_LABEL[l]).join(' / ')})</summary>`;
  EXTRA_LANGS.forEach(l => {
    html += `<div class="lang-group">
      <span class="lang-tag">${LANG_LABEL[l]} — à compléter</span>`;
    fields.forEach(f => {
      const val = obj[`${f.field}_${l}`] || '';
      const ph = f.placeholder(l);
      if(f.type === 'textarea'){
        html += `<textarea placeholder="${esc(ph)}" data-${kind}field="${f.field}_${l}" data-${idAttr}="${obj.id}">${esc(val)}</textarea>`;
      } else {
        html += `<input type="text" class="${f.cls||''}" placeholder="${esc(ph)}" value="${esc(val)}" data-${kind}field="${f.field}_${l}" data-${idAttr}="${obj.id}">`;
      }
    });
    html += `</div>`;
  });
  html += `</details>`;
  return html;
}

function allergenGrid(it){

      <input type="checkbox" data-code="${a.code}" ${isChecked?'checked':''}> ${esc(a.fr)}
    </label>`;
  });
  html += `</div>`;
  return html;
}

// ---------- Drag & drop reordering ----------
async function persistOrder(containerId, table, extraFilter){
  const container = document.getElementById(containerId);
  if(!container) return;
  const ids = [...container.children].map(child => child.dataset.cat || child.dataset.item);
  await Promise.all(ids.map((id, idx) => supabase.from(table).update({ sort_order: idx }).eq('id', id)));
  await loadAll(); render();
}

function setupSortable(){
  if(typeof Sortable === 'undefined') return;
  const foodList = document.getElementById('food-cats-list');
  if(foodList) new Sortable(foodList, { handle: '.cat-drag-handle', animation:150, onEnd: () => persistOrder('food-cats-list','categories') });
  const drinkList = document.getElementById('drink-cats-list');
  if(drinkList) new Sortable(drinkList, { handle: '.cat-drag-handle', animation:150, onEnd: () => persistOrder('drink-cats-list','categories') });
  document.querySelectorAll('.items-list').forEach(list => {
    new Sortable(list, { handle: '.item-drag-handle', animation:150, onEnd: () => persistOrder(list.id, 'items') });
  });
}

function bindManagerEvents(){
  document.getElementById('exit-btn').onclick = () => { location.hash=''; state.view='menu'; render(); };
  document.getElementById('kitchen-btn').onclick = () => { state.view = 'kitchen'; render(); };
  document.getElementById('logout-btn').onclick = async () => { await supabase.auth.signOut(); location.hash=''; state.view='menu'; render(); };
  document.querySelectorAll('.tab').forEach(t => t.onclick = () => { state.editingTab = t.dataset.tab; render(); });

  if(state.editingTab === 'menu'){
    document.querySelectorAll('[data-cat-name-fr]').forEach(inp => inp.onchange = async () => {
      const { error } = await supabase.from('categories').update({ name_fr: inp.value }).eq('id', inp.dataset.catNameFr);
      if(!checkErr(error, "modification du nom de catégorie")) return;
      await loadAll(); render();
    });
    document.querySelectorAll('[data-catfield]').forEach(inp => inp.onchange = async () => {
      const { error } = await supabase.from('categories').update({ [inp.dataset.catfield]: inp.value }).eq('id', inp.dataset.catId);
      if(!checkErr(error, "modification de la catégorie")) return;
      await loadAll(); render();
    });
    document.querySelectorAll('[data-del-cat]').forEach(btn => btn.onclick = async () => {
      if(!confirm('Supprimer cette catégorie et tous ses plats ?')) return;
      const { error } = await supabase.from('categories').delete().eq('id', btn.dataset.delCat);
      if(!checkErr(error, "suppression de catégorie")) return;
      await loadAll(); render();
    });
    document.querySelectorAll('[data-field]').forEach(field => field.onchange = async () => {
      const { error } = await supabase.from('items').update({ [field.dataset.field]: field.value }).eq('id', field.dataset.itemId);
      if(!checkErr(error, "modification du plat")) return;
      await loadAll(); render();
    });
    document.querySelectorAll('[data-itemfield]').forEach(field => field.onchange = async () => {
      const { error } = await supabase.from('items').update({ [field.dataset.itemfield]: field.value }).eq('id', field.dataset.itemId);
      if(!checkErr(error, "modification du plat")) return;
      await loadAll(); render();
    });
    document.querySelectorAll('[data-allergen-item]').forEach(container => {
      container.querySelectorAll('input[type=checkbox]').forEach(cb => cb.onchange = async () => {
        const codes = [...container.querySelectorAll('input[type=checkbox]:checked')].map(c => c.dataset.code);

    document.querySelectorAll('[data-toggle]').forEach(tog => tog.onclick = async () => {
      const item = state.items.find(i => i.id === tog.dataset.toggle);
      const { error } = await supabase.from('items').update({ out_of_stock: !item.out_of_stock }).eq('id', item.id);

      await loadAll(); render();
      showToast(!item.out_of_stock ? `${item.name_fr} marqué en rupture` : `${item.name_fr} de nouveau disponible`);

    document.querySelectorAll('[data-del-item]').forEach(btn => btn.onclick = async () => {

      await loadAll(); render();

    document.querySelectorAll('[data-add-item]').forEach(btn => btn.onclick = async () => {
      const maxOrder = Math.max(0, ...itemsFor(btn.dataset.addItem).map(i => i.sort_order||0));

      const { error } = await supabase.from('formulas').update({ [field.dataset.ffield]: field.value }).eq('id', field.dataset.formulaId);
      if(!checkErr(error, "modification de la formule")) return;
      await loadAll(); render();

    document.querySelectorAll('[data-del-formula]').forEach(btn => btn.onclick = async () => {
      const { error } = await supabase.from('formulas').delete().eq('id', btn.dataset.delFormula);
      if(!checkErr(error, "suppression de la formule")) return;
      await loadAll(); render();
    });
    const addFormulaBtn = document.getElementById('add-formula-btn');
    if(addFormulaBtn) addFormulaBtn.onclick = async () => {
      const maxOrder = Math.max(0, ...state.formulas.map(f => f.sort_order||0));

      if(!checkErr(error, "ajout d'une formule")) return;
      await loadAll(); render();

    document.getElementById('save-mock-intro-btn').onclick = async () => {
      const payload = { mocktail_intro_fr: document.getElementById('mock-intro-fr').value };
      document.querySelectorAll('[data-mifield]').forEach(el => { payload[el.dataset.mifield] = el.value; });
      const { error } = await supabase.from('restaurant_settings').update(payload).eq('id', 1);
      if(!checkErr(error, "enregistrement de l'intro")) return;
      await loadAll(); render();
      showToast('Intro enregistrée.');
    };
    document.querySelectorAll('[data-mfield]').forEach(field => field.onchange = async () => {
      const { error } = await supabase.from('mocktail_options').update({ [field.dataset.mfield]: field.value }).eq('id', field.dataset.mocktailId);
      if(!checkErr(error, "modification de l'option")) return;
      await loadAll(); render();
    });
    document.querySelectorAll('[data-del-mocktail]').forEach(btn => btn.onclick = async () => {
      const { error } = await supabase.from('mocktail_options').delete().eq('id', btn.dataset.delMocktail);
      if(!checkErr(error, "suppression de l'option")) return;
      await loadAll(); render();
    });
    document.querySelectorAll('[data-add-mocktail]').forEach(btn => btn.onclick = async () => {
      const maxOrder = Math.max(0, ...mocktailOptionsByType(btn.dataset.addMocktail).map(o => o.sort_order||0));
      const { error } = await supabase.from('mocktail_options').insert({ type: btn.dataset.addMocktail, name_fr: '', price: '', sort_order: maxOrder + 1 });
      if(!checkErr(error, "ajout d'une option")) return;
      await loadAll(); render();
    });
  }

  if(state.editingTab === 'appels'){
    document.querySelectorAll('[data-done-call]').forEach(btn => btn.onclick = async () => {
      const { error } = await supabase.from('server_calls').update({ status: 'done' }).eq('id', btn.dataset.doneCall);
      if(!checkErr(error, "traitement de l'appel")) return;
      await loadServerCalls(); render();
    });
  }

  if(state.editingTab === 'qr'){
    const link = location.origin + location.pathname;
    new QRCode(document.getElementById('qr-canvas'), { text: link, width: 180, height: 180, colorDark:'#182922', colorLight:'#ffffff' });
    document.getElementById('copy-link').onclick = () => navigator.clipboard.writeText(link).then(()=>showToast('Lien copié !'));
  }

  if(state.editingTab === 'reglages'){
    document.getElementById('save-name-btn').onclick = async () => {
      const payload = {
        name_fr: document.getElementById('rname-fr').value.trim() || 'Votre Restaurant',
        instagram_url: document.getElementById('rinstagram').value.trim(),
      };
      EXTRA_LANGS.forEach(l => { payload[`name_${l}`] = document.getElementById(`rname-${l}`).value.trim(); });
      await supabase.from('restaurant_settings').update(payload).eq('id', 1);
      await loadAll(); render();
      showToast('Réglages mis à jour.');
    };
    const hToggle = document.querySelector('[data-toggle-highlights]');
    if(hToggle) hToggle.onclick = async () => {
      const newVal = state.settings.show_highlights === false ? true : false;
      const { error } = await supabase.from('restaurant_settings').update({ show_highlights: newVal }).eq('id', 1);
      if(!checkErr(error, "changement d'affichage des coups de cœur")) return;
      await loadAll(); render();
      showToast(newVal ? 'Coups de Cœur affichés.' : 'Coups de Cœur masqués.');
    };
    document.getElementById('save-story-btn').onclick = async () => {
      const payload = { story_fr: document.getElementById('story-fr').value };
      document.querySelectorAll('[data-storyfield]').forEach(el => { payload[el.dataset.storyfield] = el.value; });
      const { error } = await supabase.from('restaurant_settings').update(payload).eq('id', 1);
      if(!checkErr(error, "enregistrement de l'histoire")) return;
      await loadAll(); render();
      showToast('Histoire enregistrée.');
    };
  }
}

// Realtime: reflect DB changes live (e.g. manager updates on another device)
function subscribeRealtime(){
  supabase.channel('menu-changes')
    .on('postgres_changes', { event: '*', schema: 'public', table: 'items' }, async () => { await loadAll(); render(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'categories' }, async () => { await loadAll(); render(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'restaurant_settings' }, async () => { await loadAll(); render(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'formulas' }, async () => { await loadAll(); render(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'mocktail_options' }, async () => { await loadAll(); render(); })
    .on('postgres_changes', { event: '*', schema: 'public', table: 'server_calls' }, async () => {
      if(state.view === 'manager'){ await loadServerCalls(); render(); }
    })
    .subscribe();
}

window.addEventListener('hashchange', async () => {
  if(location.hash === '#gestion' && state.view === 'menu'){
    const { data: { session } } = await supabase.auth.getSession();
    state.view = session ? 'manager' : 'login';
    if(session) await loadServerCalls();
    render();
  }
  if(location.hash !== '#gestion' && state.view !== 'menu'){ state.view='menu'; render(); }
});

(async function init(){
  applyTheme();
  await loadAll();
  if(state.view === 'checking'){
    const { data: { session } } = await supabase.auth.getSession();
    state.view = session ? 'manager' : 'login';
    if(session) await loadServerCalls();
  }
  render();
  subscribeRealtime();
})();
</script>
